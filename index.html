<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>성심동물의료센터 EMR 포털</title>

<!-- iOS 및 웹앱 공통 설정 -->
<link rel="apple-touch-icon" href="로고_사진.png">
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="성심EMR">

<!-- 공통 CSS 연결 -->
<link rel="stylesheet" href="css/common.css">

<style>
  /* 홈 화면 전용 레이아웃 */
  .hub-container { padding: 40px 20px; max-width: 600px; margin: 0 auto; }
  .hub-header { text-align: center; margin-bottom: 40px; }
  .hub-logo { width: 120px; margin-bottom: 16px; }
  .hub-title { font-size: 20px; font-weight: 600; color: var(--ink); }
  
  .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
  .menu-card { 
    background: var(--canvas); border: 1px solid var(--hairline); border-radius: var(--r); 
    padding: 24px 16px; text-align: center; text-decoration: none; color: var(--ink);
    transition: all 0.2s; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  .menu-card:hover { border-color: var(--primary); box-shadow: 0 4px 12px rgba(30,140,170,0.1); transform: translateY(-2px); }
  .menu-icon { font-size: 28px; }
  .menu-title { font-size: 14px; font-weight: 600; }
  
  .menu-disabled { opacity: 0.5; pointer-events: none; }
</style>
</head>
<body>

<div class="hub-container">
  <div class="hub-header">
    <img src="로고_사진.png" alt="성심동물의료센터" class="hub-logo">
    <h1 class="hub-title">EMR 자동화 포털</h1>
  </div>

  <div class="menu-grid">
    <!-- 신체검사 모듈 연결 -->
    <a href="modules/physical_exam.html" class="menu-card">
      <span class="menu-icon">🩺</span>
      <span class="menu-title">신체검사</span>
    </a>
    
    <!-- 처방전 모듈 (준비 중) -->
    <a href="#" class="menu-card menu-disabled">
      <span class="menu-icon">💊</span>
      <span class="menu-title">처방전 발행<br><small style="font-size:10px; color:var(--muted); font-weight:400;">(준비 중)</small></span>
    </a>
    
    <!-- 추가 기능 예약 자리 -->
    <a href="#" class="menu-card menu-disabled">
      <span class="menu-icon">📊</span>
      <span class="menu-title">검사결과 해석<br><small style="font-size:10px; color:var(--muted); font-weight:400;">(준비 중)</small></span>
    </a>
  </div>
</div>

</body>
</html>
