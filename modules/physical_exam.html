<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>신체검사 — 성심동물의료센터 EMR</title>

<link rel="stylesheet" href="../css/common.css">

<script src="../js/api.js"></script>

</head>
<body>

<header class=\"app-header\">
  <a href="../index.html" class="hdr-left">
    <img src="../로고_사진.png" alt="성심동물의료센터" class="hdr-logo">
    <div class="hdr-div"></div>
    <span class="hdr-title">〈 뒤로 (홈) | 신체검사</span>
  </a>
  <div class="hdr-right">
    <span class="prog-text" id="progText">0 항목</span>
    <div class="prog-bg"><div class=\"prog-fill\" id=\"progFill\"></div></div>
  </div>
</header>

<div class="page">
  <div class="pt-bar">
    <span class="pt-label">환자</span>
    <div class="pt-field">
      <label>이름</label>
      <input type="text" id="ptName" placeholder="환자명" autocomplete="off" style="min-width:90px;" oninput="saveDraft()">
    </div>
    <div class="pt-field" style="margin-left:12px;">
      <label>품종</label>
      <select id="ptSpecies" onchange="onSpecies(); saveDraft();">
        <option value="">선택</option>
        <option value="dog">개 (Canine)</option>
        <option value="cat">고양이 (Feline)</option>
      </select>
    </div>
    <div class="pt-field" style="margin-left:12px;">
      <label>날짜</label>
      <input type="date" id="ptDate" onchange="saveDraft()">
    </div>
    <div style="flex:1;"></div>
    <button class="btn btn-sec" onclick="clearAll()" style="margin-right:6px;">초기화</button>
    <button class="btn" onclick="copyText()">차트 텍스트 복사</button>
  </div>

  <div class="main-layout">
    <div class="pane-left" id="formPane">
      </div>

    <div class="pane-right">
      <div class="out-box">
        <div class="out-hdr">
          <span>차트 텍스트 미리보기</span>
          <span class="out-stat" id="botStat">입력 대기</span>
        </div>
        <textarea id="outTa" readonly placeholder="신체검사 항목을 입력하면 임상 차트 서식으로 실시간 텍스트가 생성됩니다."></textarea>
      </div>
    </div>
  </div>
</div>

<script>
// 기존 글로벌 데이터 구조 및 매핑 테이블 유지
let species = '';
let S = {};

const LN_KEYS = ['ln_submand','ln_prescap','ln_axillary','ln_inguinal','ln_popliteal'];
const LN_SHORT = ['하악','견갑전','액와','서행','오금'];

// 데이터 입력 여부(검사 시행 여부)를 엄격하게 판단하는 헬퍼 함수
function hasData(k) {
  const s = S[k];
  if (!s) return false;
  
  // 1. 단순 value가 존재하는 경우
  if (s.value !== null && s.value !== '') return true;
  
  // 2. 체크박스(findings) 배열에 요소가 존재하는 경우
  if (s.findings && s.findings.length > 0) return true;
  
  // 3. 주관식 메모가 입력된 경우
  if (s.memo && s.memo.trim() !== '') return true;
  
  // 4. 심잡음 Grade가 입력된 경우
  if (k === 'murmur' && s.grade) return true;
  
  return false;
}

// 해당 항목이 '비정상(Abnormal)'인지 판별하는 헬퍼 함수
function isAbn(k) {
  const s = S[k];
  if (!s) return false;
  
  // 1. 명시적으로 abnormal 플래그가 활성화된 경우
  if (s.abnormal === true) return true;
  
  // 2. value 값이 '정상', '없음'이 아닌 유의미한 값일 경우
  if (s.value !== null && s.value !== '' && s.value !== '정상' && s.value !== '없음' && s.value !== '규칙(Regular)') {
    // 특외 예외 케이스 처리
    if (k === 'mentation' && s.value === 'BAR') return false;
    if (k === 'mm_color' && s.value === '핑크') return false;
    if (k === 'mm_moist' && s.value === '촉촉') return false;
    if (k === 'crt' && s.value === '1-2sec') return false;
    return true;
  }
  
  // 3. 다중 선택 findings에 '정상'이나 '이상 없음' 외의 항목이 들어간 경우
  if (s.findings && s.findings.length > 0) {
    const hasTrueAbn = s.findings.some(f => f !== '정상' && f !== '이상 없음');
    if (hasTrueAbn) return true;
  }
  
  // 4. 심잡음이 '있음'으로 설정된 경우
  if (k === 'murmur' && s.value === '있음') return true;
  
  return false;
}

// [핵심 개편] 방법 A: 시스템별 통합 요약 방식 기반 텍스트 생성기
function buildText() {
  const name = document.getElementById('ptName').value || '—';
  const sp = species === 'dog' ? '개' : species === 'cat' ? '고양이' : '—';
  const dt = document.getElementById('ptDate').value || '—';

  const v = k => S[k]?.value ?? null;
  const f = k => {
    let fi = S[k]?.findings || [];
    let memo = S[k]?.memo?.trim();
    if (fi.includes('기타') && memo) {
      fi = fi.filter(x => x !== '기타');
      fi.push(memo);
    }
    return fi.length ? fi.join(', ') : null;
  };
  const m = k => S[k]?.memo?.trim() || null;
  const vf = k => f(k) || v(k);

  const lines = [];
  lines.push(`[Physical Exam] ${dt} / ${name} (${sp})`);
  lines.push('--------------------------------------------------');

  // 1. Vital Signs & General Mentation (필수 활력징후 및 기본 상태)
  const tV = v('temp') ? S['temp'].value + '°C' : '—';
  const hV = v('hr') ? v('hr') + 'bpm' : '—';
  const rV = v('rr') ? v('rr') + '/min' : '—';
  const bV = v('bp') ? v('bp') + 'mmHg' : '—';
  lines.push(`◎ V/S: T ${tV}, HR ${hV}, RR ${rV}, BP ${bV}`);

  const genParts = [];
  if (v('mentation')) genParts.push(`Mentation: ${v('mentation')}`);
  if (v('posture')) genParts.push(`자세/보행: ${v('posture')}`);
  if (v('aggression')) genParts.push(`공격성: ${v('aggression')}`);
  if (genParts.length) lines.push(`  [General] ${genParts.join(' | ')}`);
  
  const mmC = v('mm_color') || '핑크';
  const mmM = v('mm_moist') || '촉촉';
  const crtV = v('crt') || '1-2sec';
  lines.push(`  [MM/CRT] 점막색(${mmC}), 습도(${mmM}), CRT(${crtV})`);
  lines.push('');

  // 2. 계통별 시스템 정의 (검사 여부 역추적 및 축약 처리 모델)
  const systems = [
    {
      name: '심혈관계 (Cardiovascular)',
      keys: ['heart_rhythm', 'murmur'],
      build: () => {
        const parts = [];
        if (v('heart_rhythm')) parts.push(`리듬 ${v('heart_rhythm')}`);
        if (v('murmur') === '있음') parts.push(`심잡음+ (G${S['murmur']?.grade || '?'})`);
        else if (v('murmur') === '없음') parts.push('심잡음 없음');
        return parts.join(', ');
      }
    },
    {
      name: '호흡기계 (Respiratory)',
      keys: ['resp_effort', 'lungs'],
      build: () => {
        const parts = [];
        if (v('resp_effort') && v('resp_effort') !== '정상') parts.push(`호흡노력: ${v('resp_effort')}`);
        if (vf('lungs') && vf('lungs') !== '정상') parts.push(`폐 청진: ${vf('lungs')}${m('lungs') ? ` (${m('lungs')})` : ''}`);
        return parts.join(', ');
      }
    },
    {
      name: '체형/수화 (Body Condition)',
      keys: ['bcs', 'mcs', 'hydration'],
      build: () => {
        const parts = [];
        if (v('bcs')) parts.push(`BCS ${v('bcs')}/9`);
        if (v('mcs') && v('mcs') !== '정상') parts.push(`MCS ${v('mcs')}`);
        if (v('hydration') && v('hydration') !== '정상') parts.push(`탈수: ${v('hydration')}`);
        return parts.join(', ');
      }
    },
    {
      name: '두부 검사 (Head/ENT)',
      keys: ['eyes', 'ears', 'nose', 'oral'],
      build: () => {
        const parts = [];
        ['eyes', 'ears', 'nose', 'oral'].forEach(k => {
          const val = vf(k);
          if (val && val !== '정상') {
            const kor = k === 'eyes' ? '눈' : k === 'ears' ? '귀' : k === 'nose' ? '코' : '구강';
            parts.push(`${kor}(${val}${m(k) ? ` - ${m(k)}` : ''})`);
          }
        });
        return parts.join(' | ');
      }
    },
    {
      name: '근골격/신경계 (Musculoskeletal/Nerve)',
      keys: ['neck_pain', 'neck_rom'],
      build: () => {
        const parts = [];
        if (v('neck_pain') && v('neck_pain') !== '없음') parts.push(`경추통증: ${v('neck_pain')}`);
        if (v('neck_rom') && v('neck_rom') !== '정상') parts.push(`ROM: ${v('neck_rom')}`);
        return parts.join(', ');
      }
    },
    {
      name: '림프절 (Lymph Nodes)',
      keys: LN_KEYS,
      build: () => {
        return LN_KEYS.map((k, i) => {
          const val = v(k);
          return (val && val !== '정상') ? `${LN_SHORT[i]}(${val})` : null;
        }).filter(Boolean).join(', ');
      }
    },
    {
      name: '복부 촉진 (Abdomen)',
      keys: ['abd_tension', 'abd_pain', 'abd_findings'],
      build: () => {
        const parts = [];
        if (v('abd_tension') && v('abd_tension') !== '정상') parts.push(`복압/팽만: ${v('abd_tension')}`);
        if (v('abd_pain') && v('abd_pain') !== '없음') parts.push(`복통: ${v('abd_pain')}`);
        const abdF = vf('abd_findings');
        if (abdF && abdF !== '이상 없음') parts.push(`촉진 소견: ${abdF}${m('abd_findings') ? ` (${m('abd_findings')})` : ''}`);
        return parts.join(', ');
      }
    },
    {
      name: '피부/피모 (Integumentary)',
      keys: ['haircoat', 'skin'],
      build: () => {
        const parts = [];
        if (vf('haircoat') && vf('haircoat') !== '정상') parts.push(`피모: ${vf('haircoat')}`);
        if (vf('skin') && vf('skin') !== '정상') parts.push(`병변: ${vf('skin')}${m('skin') ? ` (${m('skin')})` : ''}`);
        return parts.join(', ');
      }
    },
    {
      name: '종괴 평가 (Masses)',
      keys: ['masses_yn'],
      build: () => {
        if (v('masses_yn') === '있음') return `종괴 확인됨: ${m('masses_detail') || '상세내용 없음'}`;
        return '';
      }
    },
    {
      name: '생식기계 (Reproductive)',
      keys: ['repro'],
      build: () => {
        if (vf('repro') && vf('repro') !== '정상') return `${vf('repro')}${m('repro') ? ` (${m('repro')})` : ''}`;
        return '';
      }
    }
  ];

  // 각 계통 순회하며 동적 렌더링 진행
  systems.forEach(sys => {
    // 1단계: 해당 시스템 내의 키 중 단 하나라도 임상가가 터치(입력)했는지 확인
    const filledKeys = sys.keys.filter(hasData);
    
    // 만약 해당 시스템의 어떤 항목도 검사하지 않았다면 출력하지 않음 (Not Examined)
    if (filledKeys.length === 0) return;

    // 2단계: 해당 시스템 내부에 하나라도 이상 소견(Abnormal) 항목이 포착되는지 검사
    const hasAbnormal = sys.keys.some(k => isAbn(k));
    const dynamicDetail = sys.build();

    if (hasAbnormal && dynamicDetail) {
      // 이상 소견 검출 시: 가독성을 위해 강조 마커(●)와 상세 텍스트 강제 개행 출력
      lines.push(`● [이상] ${sys.name}`);
      lines.push(`   ↳ ${dynamicDetail}`);
    } else {
      // 모든 하위 항목이 완벽히 정상일 때: 한 줄로 깔끔하게 축약 선언 (WNL)
      lines.push(`○ [정상] ${sys.name}: 특이사항 없음 (WNL)`);
    }
  });

  return lines.join('\n');
}

// 실시간 출력 업데이트 함수 (기존 UI 흐름 유지)
function updateOutput() {
  const txt = buildText();
  document.getElementById('outTa').value = txt;
  
  // 진행률 및 상태 바 연동 로직
  let cnt = 0;
  Object.keys(S).forEach(k => { if(hasData(k)) cnt++; });
  document.getElementById('progText').textContent = `${cnt} 항목 입력됨`;
  document.getElementById('botStat').textContent = cnt > 0 ? '차트 실시간 동기화 중' : '입력 대기';
}

// 기존 데이터 저장 및 칩 제어 로직 함수들... (기존 자바스크립트 코드 유지)
</script>
</body>
</html>
